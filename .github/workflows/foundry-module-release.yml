name: Build & Release Foundry Module
on:
  workflow_dispatch:
  push:
    tags: [ "foundry-module-v*" ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build foundry module
        run: npm run build:foundry

      - name: Create module zip
        run: |
          cd packages/foundry-module
          zip -r ../../foundry-vtt-mcp.zip             module.json             dist             lang             styles             templates             types             scripts             -x ".*" -x "node_modules/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: foundry-vtt-mcp.zip
          generate_release_notes: true
